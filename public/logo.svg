<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 258 112">

  <!-- Thin border (matches original) -->
  <rect x="0.5" y="0.5" width="257" height="111"
    fill="none" stroke="#cccccc" stroke-width="1"/>

  <!-- B -->
  <text x="12" y="82"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="80" font-weight="900"
    fill="#16161a">B</text>

  <!-- Z in black -->
  <text x="84" y="82"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="80" font-weight="900"
    fill="#16161a">Z</text>

  <!-- Red diagonal: top-RIGHT → bottom-LEFT matching Z's own diagonal stroke -->
  <line x1="140" y1="1" x2="80" y2="84"
    stroke="#990f4b"
    stroke-width="10"
    stroke-linecap="round"/>

  <!-- G -->
  <text x="150" y="82"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="80" font-weight="900"
    fill="#16161a">G</text>

  <!-- Tagline -->
  <text x="12" y="105"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" fill="#444444"
    letter-spacing="1.8">BigzImpact Global Pvt Ltd</text>

</svg>
